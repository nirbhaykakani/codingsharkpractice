<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <style>
        .container{
            width: 95%;
            height: 100%;
            background-color: white;    
            border-radius: 25px;
            padding: 30px;             
            margin: 60px auto;  
        }
    </style>
</head>
<body style="background-color: #60a5fa;">
    <div class="container">
        <input type ="number" id="num1" placeholder="Enter first Number">
        <input type ="number" id="num2" placeholder="Enter second Number"> 
        <br>
        <br>
        <button onclick="addNumbers()">+</button>
        <button onclick="subtractNumbers()">-</button>
        <button onclick="multiplyNumbers()">*</button>
        <button onclick="divideNumbers()">/</button>
        <button onclick="percentage()">%(Percentage)</button>
        <button onclick="mod_value()">%(MOD_VALUE)</button>
        <br>
        <br>
        <div class="result" id="result">Show Result</div>
    </div>

    <script>
        function addNumbers(){
            var num1=parseInt(document.getElementById("num1").value);
            var num2=parseInt(document.getElementById("num2").value);
            var total=num1+num2;
            document.getElementById("result").innerText="Result: "+total;
            alert(total);
        }
        function subtractNumbers(){
            var num1=parseInt(document.getElementById("num1").value);
            var num2=parseInt(document.getElementById("num2").value);
            var total=num1-num2;
            document.getElementById("result").innerText="Result: "+total;
            alert(total);
        }
        function multiplyNumbers(){
            var num1=parseInt(document.getElementById("num1").value);
            var num2=parseInt(document.getElementById("num2").value);
            var total=num1*num2;
            document.getElementById("result").innerText="Result: "+total;
            alert(total);
        }
        function divideNumbers(){
            var num1=parseInt(document.getElementById("num1").value);
            var num2=parseInt(document.getElementById("num2").value);
            var total=num1/num2;
            document.getElementById("result").innerText="Result: "+total;
            alert(total);
        }
        function percentage(){
            var num1=parseInt(document.getElementById("num1").value);
            var num2=parseInt(document.getElementById("num2").value);
            var total=(num1/num2)*100;
            document.getElementById("result").innerText="Result: "+total;
            alert(total);
        }
        function mod_value(){
            var num1=parseInt(document.getElementById("num1").value);
            var num2=parseInt(document.getElementById("num2").value);
            var total=(num1%num2);
            document.getElementById("result").innerText="Result: "+total;
            alert(total);
        }
    </script>
</body>
</html>
